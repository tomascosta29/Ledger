name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Verify build
        run: go build ./...
      - name: Run go vet
        run: go vet ./...
      - name: Run tests
        run: go test -count=1 ./...
