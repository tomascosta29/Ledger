# GoReleaser config — https://goreleaser.com
# Used by .github/workflows/release.yml to cut a GitHub release when a
# tag is pushed. Builds a static `ledger` binary for linux/darwin/windows
# on amd64+arm64 and uploads archives + checksums.

project_name: ledger

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/ledger
    binary: ledger
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - SPEC.md
      - LICENSE*

checksum:
  algorithm: sha256

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - "^WIP"

release:
  prerelease: auto
  draft: false
